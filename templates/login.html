{% extends 'base.html' %}
{% block content %}
<section class="auth-wrap">
  <form class="card auth-card" method="post" action="/login">
    <h1>Accedi</h1>
    <p>Inserisci la tua email e il codice personale ricevuto da ConsulentIA.</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <label>Email<input type="email" name="email" required /></label>
    <label>Codice accesso<input type="text" name="access_code" placeholder="CONS-XXXXXX" required /></label>
    <button class="btn" type="submit">Entra</button>
    <p style="margin-top:14px; font-size:14px;">Non hai ancora un codice? <a href="/request-access"><strong>Richiedi accesso</strong></a></p>
  </form>
</section>
{% endblock %}

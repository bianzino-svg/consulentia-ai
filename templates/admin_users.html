{% extends 'base.html' %}
{% block content %}
<section class="page-head">
  <div>
    <span class="eyebrow">Admin</span>
    <h1>Clienti registrati</h1>
  </div>
</section>

<section class="card">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Report generati</th>
        <th>Piano</th>
      </tr>
    </thead>
    <tbody>
      {% for user in users %}
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.report_count }}</td>
        <td>{{ user.plan }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
